document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 15H3L8 3z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;min-width:160px\"><div style=\"font-family:'Sora';font-weight:700;font-size:18px\">Encontro com Deus · Turma UV 04<\u002Fdiv><div style=\"font-size:12px;color:#9fc4bf\">Preparação inicia 60 dias antes · faltam 38 dias · só coordenação e pastores<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:6px\"><span style=\"font-size:11px;font-weight:700;color:#06302c;background:#5eead4;padding:6px 12px;border-radius:20px\">Masculino + Feminino<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px\">\n            <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\"><span style=\"font-size:18px\"><svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><path d=\"M6 14l1.5-2.5A2 2 0 0 1 9.2 10.5H22l-2.6 6.5A2 2 0 0 1 17.6 18.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.7.9l.8 1.2a2 2 0 0 0 1.7.9H18a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:13.5px;font-weight:700;color:#0f3a36\">Ministrações<\u002Fdiv><\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5;margin-bottom:10px\">Cada ministração é uma pasta com material; o sistema envia ao ministrante.<\u002Fdiv><div style=\"display:flex;justify-content:space-between;font-size:12px;color:#3c4f4c\"><span>6 de 8 cadastradas<\u002Fspan><span style=\"color:#d97706;font-weight:700\">2 sem ministrante<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\"><span style=\"font-size:18px\"><svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><rect x=\"9\" y=\"2\" width=\"6\" height=\"12\" rx=\"3\"><\u002Frect><path d=\"M5 10a7 7 0 0 0 14 0M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:13.5px;font-weight:700;color:#0f3a36\">Ministrantes<\u002Fdiv><\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5;margin-bottom:10px\">Definidos após as ministrações.<\u002Fdiv><div style=\"font-size:12px;color:#3c4f4c\">6 confirmados<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\"><span style=\"font-size:18px\"><svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M16 8l-2.5 5.5L8 16l2.5-5.5z\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"font-size:13.5px;font-weight:700;color:#0f3a36\">Guias<\u002Fdiv><\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5;margin-bottom:10px\">Indicados por líderes entre quem vai servir.<\u002Fdiv><div style=\"font-size:12px;color:#3c4f4c\">14 guias · 2 por pessoa<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\"><span style=\"font-size:18px\"><svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><path d=\"M18 11V6a2 2 0 0 0-4 0M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8a8 8 0 0 0 8 8h2a8 8 0 0 0 8 size:13.5px;font-weight:700;color:#0f3a36\">Consagração<\u002Fdiv><\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5;margin-bottom:10px\">Vigílias, oração e jejum.<\u002Fdiv><div style=\"font-size:12px;color:#3c4f4c\">3 vigílias agendadas<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px;font-size:12px;color:#92400e;line-height:1.5\"><svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><path d=\"M5 22h14M5 2h14M6 2c0 4 4 6 6 8 2-2 6-4 6-8M6 22c0-4 4-6 6-8 2 2 6 4 6 8\"><\u002Fpath><\u002Fsvg> Nos primeiros 20 dias: definir professores, ministrantes, guias, data do batismo (após aula 8), valores, compra de livros e abrir matrículas ao público.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ========== ONBOARDING DA IGREJA ========== -->\n        <sc-if value=\"{{ show.onboarding }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:720px;margin:0 auto\">\n          <div onclick=\"{{ nav.master }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#0d9488;cursor:pointer;margin-bottom:14px\">‹ Console Master<\u002Fdiv>\n          <div style=\"background:linear-gradient(135deg,#0d9488,#0f3a36);border-radius:18px;padding:22px;color:#fff;margin-bottom:16px\"><div style=\"font-family:'Sora';font-weight:700;font-size:19px\">Bem-vinda, Igreja Nova Aliança! <svg width=\"1em\" height=\"1em\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-0.15em;flex-shrink:0\"><path d=\"M9 3l1.4 3.6L14 8l-3.6 1.4L9 13l-1.4-3.6L4 8z\"><\u002Fpath><path d=\"M17.5 13l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6z\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div style=\"font-size:13px;color:#bfe4df;margin-top:4px\">Vamos configurar sua igreja em 4 passos. O gerente de conta começa por aqui.<\u002Fdiv><\u002Fdiv>\n          <!-- step 1 done -->\n          <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px;display:flex;align-items:center;gap:13px;margin-bottom:10px\"><div style=\"width:32px;height:32px;border-radius:50%;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0\">✓<\u002Fdiv><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:700;color:#0f3a36\">1 · Dados da igreja<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5\">Nome, CNPJ, endereço, pastor principal<\u002Fdiv><\u002Fdiv><span style=\"font-size:11px;font-weight:700;color:#16a34a\">Concluído<\u002Fspan><\u002Fdiv>\n          <!-- step 2 active -->\n          <div style=\"background:#fff;border:1.5px solid #0d9488;border-radius:16px;padding:18px;margin-bottom:10px;box-shadow:0 6px 18px rgba(13,148,136,.12)\">\n            <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:14px\"><div style=\"width:32px;height:32px;border-radius:50%;background:#0d9488;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0\">2<\u002Fdiv><div><div style=\"font-size:13.5px;font-weight:700;color:#0f3a36\">Metodologia ministerial<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5\">Escolha um preset — você pode customizar depois<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n              <div style=\"border:1.5px solid #0d9488;background:#e6f5f3;border-radius:13px;padding:14px;cursor:pointer\"><div style=\"font-size:13px;font-weight:700;color:#0d9488\">✓ Visão G12<\u002Fdiv><div style=\"font-size:11px;color:#3c4f4c;margin-top:4px;line-height:1.4\">Ganhar · Consolidar · Discipular · Enviar. Trilha e organograma prontos.<\u002Fdiv><\u002Fdiv>\n              <div style=\"border:1.5px solid #e2e9e7;border-radius:13px;padding:14px;cursor:pointer\"><div style=\"font-size:13px;font-weight:700;color:#0f3a36\">Personalizada<\u002Fdiv><div style=\"font-size:11px;color:#9aa8a5;margin-top:4px;line-height:1.4\">Defina suas próprias etapas de maturidade e estrutura.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <button style=\"margin-top:16px;background:#0d9488;color:#fff;border:none;border-radius:11px;padding:11px 20px;font-family:'Sora';font-weight:700;font-size:13px;cursor:pointer\">Confirmar e continuar →<\u002Fbutton>\n          <\u002Fdiv>\n          <!-- step 3 -->\n          <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px;display:flex;align-items:center;gap:13px;margin-bottom:10px;opacity:.65\"><div style=\"width:32px;height:32px;border-radius:50%;background:#eef3f2;color:#9aa8a5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0\">3<\u002Fdiv><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:700;color:#3c4f4c\">Estrutura administrativa<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5\">Secretaria, Financeiro, Ministérios, Central de Célula, Coordenações<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <!-- step 4 -->\n          <div style=\"background:#fff;border:1px solid #e8efed;border-radius:16px;padding:16px;display:flex;align-items:center;gap:13px;opacity:.65\"><div style=\"width:32px;height:32px;border-radius:50%;background:#eef3f2;color:#9aa8a5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0\">4<\u002Fdiv><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:700;color:#3c4f4c\">Cadastro de pessoas<\u002Fdiv><div style=\"font-size:11.5px;color:#9aa8a5\">Começa pelo pastor → líderes → convite por WhatsApp para completar cadastro<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fs
